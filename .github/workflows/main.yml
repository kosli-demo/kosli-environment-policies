name: Main - apply policies to environments in https://app.kosli.com

on:
  push:
    branches:
      - main

env:
  KOSLI_ORG:       ${{ vars.KOSLI_ORG }}               # kosli-demo
  KOSLI_HOST:      https://app.kosli.com,https://staging.app.kosli.com
  KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN_PROD }},${{ secrets.KOSLI_API_TOKEN_STAGING }}
  KOSLI_DRY_RUN:   ${{ vars.KOSLI_DRY_RUN }}           # false
  KOSLI_DEBUG:     ${{ vars.KOSLI_DEBUG }}             # false


jobs:

  apply-policies-to-environments:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v2
        with:
          version: ${{ vars.KOSLI_CLI_VERSION }}

      - name: Create/Update Kosli Policies
        run: |
          kosli create policy build-process policies/build-process.yml
          kosli create policy unit-tests policies/unit-tests.yml

      - name: Attach policies to environments
        run: |
          kosli attach-policy build-process --environment=staging
          kosli attach-policy unit-tests --environment=staging

      # - name: Detach policies from environments
      #   run: |
      #     kosli detach-policy NAME --environment=staging
